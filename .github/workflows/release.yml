name: Release APK

# Personal experimental fork: build a signed RELEASE APK and publish it as a GitHub Release.
# Triggered manually (workflow_dispatch) or by pushing a tag like v4.0-exp1.
#
# Signing: if the repository secrets RELEASE_KEYSTORE_BASE64 / RELEASE_KEYSTORE_PASSWORD /
# RELEASE_KEY_ALIAS / RELEASE_KEY_PASSWORD are set, the APK is signed with that key; otherwise the
# build falls back to the debug key (still installable) so this works with zero setup.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v4.0-exp1)'
        required: true
        default: 'v4.0-exp'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install NDK for the app dictionary native build
        run: |
          set -e
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "ndk;28.0.13004108"

      - uses: gradle/actions/setup-gradle@v3

      - name: Decode release keystore (optional)
        id: keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"
            echo "Using provided release keystore."
          else
            echo "No release keystore secret set; falling back to the debug signing key."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        env:
          RELEASE_KEYSTORE: ${{ steps.keystore.outputs.path }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeliBoard-release
          path: app/build/outputs/apk/release/*-release.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          prerelease: true
          fail_on_unmatched_files: true
          body: |
            Experimental **release** build of this personal HeliBoard AI fork.

            > Not affiliated with or endorsed by upstream HeliBoard. Experimental; may be unstable.

            Signed with a release key if configured via repository secrets, otherwise debug-signed
            (still installable). Built from `${{ github.sha }}`.
          files: app/build/outputs/apk/release/*-release.apk

      - name: Archive reports for failed job
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: '*/build/reports'
        if: ${{ failure() }}
