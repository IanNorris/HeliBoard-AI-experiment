name: Build APK

# Personal experimental fork: build the combined RELEASE APK on every push to main/integration
# (and on demand). Release is preferred (R8-optimized, snappier at runtime); switch back to
# assembleDebug here if a debug build is explicitly needed.
# Signed with a release key if repo secrets are
# set, otherwise the debug key (still installable).
on:
  push:
    branches: [ main, integration ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install NDK for the app dictionary native build
        run: |
          set -e
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "ndk;28.0.13004108"

      - uses: gradle/actions/setup-gradle@v3

      - name: Decode release keystore (optional)
        id: keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        env:
          RELEASE_KEYSTORE: ${{ steps.keystore.outputs.path }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HeliBoard-release
          path: app/build/outputs/apk/release/*-release.apk

      - name: Archive reports for failed job
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: '*/build/reports'
        if: ${{ failure() }}
